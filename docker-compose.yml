services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kelime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kelime}
      POSTGRES_DB: ${POSTGRES_DB:-kelimetahmin}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - kt_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kelime}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - kt_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Kelime Tahmin}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEFAULT_LANG: ${DEFAULT_LANG:-tr}
      GAME_LANG: ${GAME_LANG:-tr}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kelime}:${POSTGRES_PASSWORD:-kelime}@db:5432/${POSTGRES_DB:-kelimetahmin}
      REDIS_URL: redis://redis:6379/0
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-*}
      JWT_SECRET: ${JWT_SECRET:-degistir-beni}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kt_net
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - kt_net
    expose:
      - "3000"

networks:
  kt_net:
    driver: bridge

volumes:
  db_data:
  redis_data:
